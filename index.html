<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/CSS/style.css" />

    <title>Product-cart-3</title>
  </head>
  <body class="bg-secondary">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-10 offset-md-1 mt-4">
          <div class="card">
            <div class="card-header">
              <div class="card-header text-center bg-warning">
                <i class="fa-solid fa-store"></i><strong>Shopping Cart</strong>
              </div>
            </div>
            <div class="card-body">
              <form action="" id="productCart">
                <div class="form-group">
                  <div>
                    <label for="title"><strong>Title</strong></label>
                    <input type="text" class="form-control" id="title" />
                  </div>
                  <div>
                    <label for="description"
                      ><strong>Descreption</strong></label
                    >
                    <input type="text" class="form-control" id="description" />
                  </div>
                  <div class="row">
                    <div class="col-md-6">
                      <div>
                        <label for="price"><strong>Price</strong></label>
                        <input type="text" class="form-control" id="price" />
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div>
                        <label for="category"><strong>Category</strong></label>
                        <input type="text" class="form-control" id="category" />
                      </div>
                    </div>
                  </div>

                  <div>
                    <label for="image"><strong>Image</strong></label>
                    <input type="text" class="form-control" id="image" />
                  </div>

                  <button
                    class="mt-2 btn btn-primary btn-sm btn-block"
                    id="butEdit"
                  >
                    Add
                  </button>

                  <button
                    type="button"
                    class="mt-2 btn d-none btn-primary btn-sm btn-block"
                    id="updatebtn"
                  >
                    Update
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
      <div class="row" id="cardContainer"></div>
    </div>
    <div class="spinner d-none" id="spinner">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden"></span>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
      integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
      crossorigin="anonymous"
    ></script>
    <script src="./assets/JS/app.js"></script>
  </body>
</html>
